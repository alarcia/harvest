name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create .env file
        run: |
          echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" > .env
          echo "DJANGO_ALLOWED_HOSTS=${{ vars.DJANGO_ALLOWED_HOSTS }}" >> .env
          echo "HOST_DB_PATH=${{ vars.HOST_DB_PATH }}" >> .env
          echo "DEPLOY_UID=$(id -u)" >> .env
          echo "DEPLOY_GID=$(id -g)" >> .env
          echo "GMAIL_IMAP_USER=${{ vars.GMAIL_IMAP_USER }}" >> .env
          echo "GMAIL_IMAP_APP_PASSWORD=${{ secrets.GMAIL_IMAP_APP_PASSWORD }}" >> .env

      - name: Initialize data directory
        run: mkdir -p ${{ vars.HOST_DB_PATH }}

      - name: Build and Run Docker
        run: |
          docker compose up -d --build
