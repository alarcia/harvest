services:
  web:
    build: .
    restart: unless-stopped
    user: "${DEPLOY_UID}:${DEPLOY_GID}"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_DB_PATH: /app/data/db.sqlite3
    volumes:
      - ${HOST_DB_PATH}:/app/data
